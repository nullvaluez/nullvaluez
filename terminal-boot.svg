<svg xmlns="http://www.w3.org/2000/svg" width="850" height="480" viewBox="0 0 850 480">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="flicker">
      <feGaussianBlur stdDeviation="0.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- CRT scanline pattern -->
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="850" height="4">
      <rect width="850" height="2" fill="transparent"/>
      <rect y="2" width="850" height="2" fill="rgba(0,0,0,0.15)"/>
    </pattern>
    <!-- Noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="noisy"/>
      <feComponentTransfer in="noisy">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="850" height="480" fill="#0a0e14" rx="12"/>
  
  <!-- Subtle border glow -->
  <rect x="1" y="1" width="848" height="478" fill="none" stroke="#0ff" stroke-opacity="0.08" rx="12"/>
  
  <!-- Terminal window chrome -->
  <rect x="0" y="0" width="850" height="36" fill="#111820" rx="12"/>
  <rect x="0" y="18" width="850" height="18" fill="#111820"/>
  <circle cx="24" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="18" r="6" fill="#28c940"/>
  <text x="425" y="22" text-anchor="middle" fill="#4a5568" font-family="monospace" font-size="12">⌘ FINAL ORBIT — COMMAND TERMINAL v4.2.0</text>

  <!-- Main terminal content area -->
  <g filter="url(#flicker)" transform="translate(28, 56)">
    
    <!-- Boot sequence line 1 -->
    <text fill="#0ff" font-family="'Courier New', monospace" font-size="13" opacity="0" filter="url(#glow)">
      <tspan x="0" dy="0">▶ INITIALIZING FINAL ORBIT COMMAND SYSTEMS...</tspan>
      <animate attributeName="opacity" values="0;1" begin="0.3s" dur="0.1s" fill="freeze"/>
    </text>

    <!-- Boot sequence line 2 -->
    <text fill="#5eead4" font-family="'Courier New', monospace" font-size="13" opacity="0">
      <tspan x="0" dy="22">  ├─ kernel .............. orbital-linux 6.2.0-final</tspan>
      <animate attributeName="opacity" values="0;1" begin="0.8s" dur="0.1s" fill="freeze"/>
    </text>

    <!-- Boot sequence line 3 -->
    <text fill="#5eead4" font-family="'Courier New', monospace" font-size="13" opacity="0">
      <tspan x="0" dy="44">  ├─ node ............... v22.0.0 (LTS)</tspan>
      <animate attributeName="opacity" values="0;1" begin="1.1s" dur="0.1s" fill="freeze"/>
    </text>

    <!-- Boot sequence line 4 -->
    <text fill="#5eead4" font-family="'Courier New', monospace" font-size="13" opacity="0">
      <tspan x="0" dy="66">  ├─ caffeination ........ ██████████ 100%</tspan>
      <animate attributeName="opacity" values="0;1" begin="1.4s" dur="0.1s" fill="freeze"/>
    </text>

    <!-- Boot sequence line 5 -->
    <text fill="#5eead4" font-family="'Courier New', monospace" font-size="13" opacity="0">
      <tspan x="0" dy="88">  └─ status ............. ALL SYSTEMS NOMINAL</tspan>
      <animate attributeName="opacity" values="0;1" begin="1.7s" dur="0.1s" fill="freeze"/>
    </text>

    <!-- Divider -->
    <text fill="#1e3a4a" font-family="'Courier New', monospace" font-size="13" opacity="0">
      <tspan x="0" dy="118">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</tspan>
      <animate attributeName="opacity" values="0;1" begin="2.0s" dur="0.1s" fill="freeze"/>
    </text>

    <!-- ASCII spacecraft -->
    <text fill="#0ff" font-family="'Courier New', monospace" font-size="13" opacity="0" filter="url(#glow)">
      <tspan x="260" dy="148">        ▲</tspan>
      <tspan x="260" dy="16">       ╱ ╲</tspan>
      <tspan x="260" dy="16">      ╱   ╲</tspan>
      <tspan x="260" dy="16">     │  ◉  │</tspan>
      <tspan x="260" dy="16">     │ F·O │</tspan>
      <tspan x="260" dy="16">    ╱│     │╲</tspan>
      <tspan x="260" dy="16">   ╱ │     │ ╲</tspan>
      <tspan x="260" dy="16">  ▕  ╰─────╯  ▏</tspan>
      <tspan x="260" dy="16">   ╲  ║ ║ ║  ╱</tspan>
      <tspan x="260" dy="16">    ╚═╩═╩═╩═╝</tspan>
      <animate attributeName="opacity" values="0;1" begin="2.3s" dur="0.4s" fill="freeze"/>
    </text>

    <!-- Thrust flame animation -->
    <text font-family="'Courier New', monospace" font-size="13" opacity="0">
      <tspan x="284" dy="308" fill="#ff6b35">    ╱▓▓╲</tspan>
      <tspan x="284" dy="14" fill="#ffbd2e">     ╱▒╲</tspan>
      <tspan x="284" dy="14" fill="#ff6b35">      ▼</tspan>
      <animate attributeName="opacity" values="0;1;0.6;1;0.7;1" begin="2.7s" dur="1.5s" repeatCount="indefinite"/>
    </text>

    <!-- Welcome message -->
    <text fill="#e2e8f0" font-family="'Courier New', monospace" font-size="14" opacity="0">
      <tspan x="0" dy="148" font-weight="bold" fill="#0ff">CREW MEMBER:</tspan>
      <tspan fill="#e2e8f0"> Byron Willamson</tspan>
      <animate attributeName="opacity" values="0;1" begin="3.2s" dur="0.1s" fill="freeze"/>
    </text>
    <text fill="#e2e8f0" font-family="'Courier New', monospace" font-size="14" opacity="0">
      <tspan x="0" dy="170" font-weight="bold" fill="#0ff">RANK:</tspan>
      <tspan fill="#e2e8f0">        Technical Solutions Architect</tspan>
      <animate attributeName="opacity" values="0;1" begin="3.5s" dur="0.1s" fill="freeze"/>
    </text>
    <text fill="#e2e8f0" font-family="'Courier New', monospace" font-size="14" opacity="0">
      <tspan x="0" dy="192" font-weight="bold" fill="#0ff">SECTOR:</tspan>
      <tspan fill="#e2e8f0">      Columbus, Ohio — Earth</tspan>
      <animate attributeName="opacity" values="0;1" begin="3.8s" dur="0.1s" fill="freeze"/>
    </text>
    <text fill="#e2e8f0" font-family="'Courier New', monospace" font-size="14" opacity="0">
      <tspan x="0" dy="214" font-weight="bold" fill="#0ff">MISSION:</tspan>
      <tspan fill="#e2e8f0">     Build things. Break things. Ship things.</tspan>
      <animate attributeName="opacity" values="0;1" begin="4.1s" dur="0.1s" fill="freeze"/>
    </text>

    <!-- Blinking cursor -->
    <rect x="388" y="207" width="9" height="16" fill="#0ff" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" begin="4.3s" dur="1s" repeatCount="indefinite"/>
    </rect>

  </g>

  <!-- CRT scanline overlay -->
  <rect width="850" height="480" fill="url(#scanlines)" opacity="0.3" rx="12"/>
  
  <!-- Corner decorations -->
  <text x="750" y="470" fill="#1e3a4a" font-family="monospace" font-size="10">SYS.MEM: 42.0TB FREE</text>
  
  <!-- Pulsing status indicator -->
  <circle cx="830" cy="464" r="4" fill="#28c940">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
